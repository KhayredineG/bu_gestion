<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - BU Gestion"></title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom Modern CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block sidebar collapse px-0">
            <div class="position-sticky pt-4 h-100">
                <div class="px-4 mb-4">
                    <h5 class="text-white fw-bold mb-0">
                        <i class="bi bi-mortarboard-fill me-2 text-primary"></i>BU Gestion
                    </h5>
                    <small class="text-muted">Système Universitaire</small>
                </div>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}" th:classappend="${currentUri == '/' ? 'active' : ''}">
                            <i class="bi bi-grid-1x2-fill"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/livres}" th:classappend="${currentUri.startsWith('/livres') ? 'active' : ''}">
                            <i class="bi bi-bookshelf"></i> Livres
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/membres}" th:classappend="${currentUri.startsWith('/membres') ? 'active' : ''}">
                            <i class="bi bi-person-badge-fill"></i> Membres
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/emprunts}" th:classappend="${currentUri.startsWith('/emprunts') ? 'active' : ''}">
                            <i class="bi bi-arrow-left-right"></i> Emprunts
                        </a>
                    </li>
                </ul>

                <div class="mt-auto px-4 pb-4 pt-5 border-top border-secondary position-absolute bottom-0 w-100">
                    <div class="d-flex align-items-center text-white mb-3">
                        <div class="bg-primary rounded-circle p-2 me-3">
                            <i class="bi bi-person-fill text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="mb-0 small fw-bold text-truncate" sec:authentication="name">User</p>
                            <small class="text-muted d-block" sec:authorize="hasRole('ADMIN')">Administrateur</small>
                            <small class="text-muted d-block" sec:authorize="hasRole('USER')">Bibliothécaire</small>
                        </div>
                    </div>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                            <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <!-- Top Navbar for mobile -->
            <nav class="navbar navbar-expand-md d-md-none mb-4 mt-2 rounded shadow-sm">
                <div class="container-fluid">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <span class="navbar-brand">BU Gestion</span>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="fade-in pt-4">
                <div layout:fragment="content">
                    <!-- Page content will be injected here -->
                </div>
            </div>

            <!-- Footer -->
            <footer class="mt-5 py-3 text-center text-muted border-top border-light">
                <small>&copy; 2026 Université - Gestion de Bibliothèque</small>
            </footer>
        </main>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
