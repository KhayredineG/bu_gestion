<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Catalogue des Livres</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Catalogue des Livres</h2>
            <p class="text-muted small mb-0">Consultez et gérez l'ensemble des ouvrages de la bibliothèque.</p>
        </div>
        <a th:href="@{/livres/nouveau}" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-lg me-2"></i>Nouveau Livre
        </a>
    </div>

    <!-- Search & Filter Card -->
    <div class="card border-0 mb-4 shadow-sm">
        <div class="card-body p-3">
            <form th:action="@{/livres}" method="get" class="row g-2">
                <div class="col-md-10">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control border-start-0 ps-0" 
                               placeholder="Rechercher par titre, auteur ou ISBN...">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark w-100">Rechercher</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Books Table -->
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th class="ps-4">Livre</th>
                    <th>Catégorie</th>
                    <th>ISBN</th>
                    <th>Stock</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="l : ${livres}" class="shadow-sm">
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 text-primary rounded p-2 me-3 d-none d-sm-block">
                                <i class="bi bi-book-fill"></i>
                            </div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${l.titre}">Titre</div>
                                <small class="text-muted" th:text="${l.auteur}">Auteur</small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge bg-light text-dark border fw-medium px-3 py-2 rounded-pill" th:text="${l.categorie}">Catégorie</span>
                    </td>
                    <td class="font-monospace small text-secondary" th:text="${l.isbn}">ISBN</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="flex-grow-1 me-2 d-none d-lg-block" style="width: 100px;">
                                <div class="progress" style="height: 6px; border-radius: 3px;">
                                    <div class="progress-bar bg-success" role="progressbar" 
                                         th:style="'width: ' + (${l.quantiteDisponible} * 100 / ${l.quantiteTotal}) + '%'"></div>
                                </div>
                            </div>
                            <span class="fw-bold" th:text="${l.quantiteDisponible}">0</span>
                            <span class="text-muted small mx-1">/</span>
                            <span class="text-muted small" th:text="${l.quantiteTotal}">0</span>
                        </div>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <a th:href="@{'/livres/modifier/' + ${l.id}}" class="btn btn-sm btn-light border-0" title="Modifier">
                                <i class="bi bi-pencil-square text-primary"></i>
                            </a>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{'/livres/supprimer/' + ${l.id}}" 
                               class="btn btn-sm btn-light border-0" 
                               onclick="return confirm('Supprimer ce livre ?')" title="Supprimer">
                                <i class="bi bi-trash3 text-danger"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(livres)}">
                    <td colspan="5" class="text-center py-5">
                        <i class="bi bi-search display-1 text-muted opacity-25 mb-3 d-block"></i>
                        <p class="text-muted">Aucun livre ne correspond à votre recherche.</p>
                        <a href="/livres" class="btn btn-sm btn-link text-decoration-none">Voir tout le catalogue</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-5">
        <ul class="pagination justify-content-center gap-1">
            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                <a class="page-link border-0 rounded-3 shadow-sm" th:href="@{/livres(page=${currentPage - 1}, keyword=${keyword})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link border-0 rounded-3 shadow-sm mx-1" 
                   th:href="@{/livres(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                <a class="page-link border-0 rounded-3 shadow-sm" th:href="@{/livres(page=${currentPage + 1}, keyword=${keyword})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
