<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - BU Gestion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: #4f46e5;
        }
        .btn-login {
            background: #4f46e5;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-weight: 600;
            color: white;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }
        .brand-icon {
            width: 64px;
            height: 64px;
            background: #4f46e5;
            color: white;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-5">
        <div class="brand-icon shadow-lg">
            <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h3 class="fw-bold text-dark">BU Gestion</h3>
        <p class="text-muted">Connectez-vous à votre espace</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger border-0 rounded-3 small mb-4">
        <i class="bi bi-exclamation-circle me-2"></i>Identifiants incorrects.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase text-secondary">Utilisateur</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted rounded-start-3">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" class="form-control border-start-0" placeholder="admin ou user" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-uppercase text-secondary">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted rounded-start-3">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login w-100 shadow-lg mb-3">
            Se connecter
        </button>
        
        <div class="text-center">
            <small class="text-muted">Système de gestion de bibliothèque universitaire</small>
        </div>
    </form>
</div>

</body>
</html>
