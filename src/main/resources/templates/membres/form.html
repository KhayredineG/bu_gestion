<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${membre.id == null ? 'Ajouter un Membre' : 'Modifier le Membre'}"></title>
</head>
<body>

<div layout:fragment="content">
    <div class="mb-4">
        <h2 class="fw-bold text-dark" th:text="${membre.id == null ? 'Ajouter un Membre' : 'Modifier le Membre'}"></h2>
        <p class="text-muted small">Créez ou modifiez le profil d'un membre de la bibliothèque.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/membres/enregistrer}" th:object="${membre}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{dateInscription}">

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-uppercase">Nom</label>
                                <input type="text" th:field="*{nom}" class="form-control" th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{nom}"></div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-uppercase">Prénom</label>
                                <input type="text" th:field="*{prenom}" class="form-control" th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{prenom}"></div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold small text-uppercase">Adresse Email</label>
                                <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-check form-switch p-3 bg-light rounded-3 d-inline-block">
                                    <input class="form-check-input ms-0 me-2" type="checkbox" th:field="*{actif}" id="actifSwitch">
                                    <label class="form-check-label fw-bold small" for="actifSwitch">MEMBRE ACTIF</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 pt-4 border-top">
                            <a href="/membres" class="btn btn-light px-4">Annuler</a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                <i class="bi bi-check-lg me-2"></i>Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
