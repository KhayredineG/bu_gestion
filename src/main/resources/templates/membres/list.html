<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Gestion des Membres</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Membres de la Bibliothèque</h2>
            <p class="text-muted small mb-0">Gérez les inscriptions et les profils des membres.</p>
        </div>
        <a th:href="@{/membres/nouveau}" class="btn btn-primary shadow-sm">
            <i class="bi bi-person-plus-fill me-2"></i>Nouveau Membre
        </a>
    </div>

    <!-- Members Table -->
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th class="ps-4">Membre</th>
                    <th>Email</th>
                    <th>Inscription</th>
                    <th>Statut</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${membres}" class="shadow-sm">
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <div class="bg-success bg-opacity-10 text-success rounded-circle p-2 me-3 d-none d-sm-block">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <div class="fw-bold text-dark" th:text="${m.nom + ' ' + m.prenom}">Nom Prénom</div>
                        </div>
                    </td>
                    <td class="text-secondary small" th:text="${m.email}">Email</td>
                    <td class="text-muted small" th:text="${#temporals.format(m.dateInscription, 'dd MMM yyyy')}">Date</td>
                    <td>
                        <span th:if="${m.actif}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2 rounded-pill">
                            <i class="bi bi-check-circle-fill me-1"></i> Actif
                        </span>
                        <span th:if="${!m.actif}" class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 px-3 py-2 rounded-pill">
                            <i class="bi bi-x-circle-fill me-1"></i> Inactif
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <a th:href="@{'/membres/modifier/' + ${m.id}}" class="btn btn-sm btn-light border-0" title="Modifier">
                                <i class="bi bi-pencil-square text-primary"></i>
                            </a>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{'/membres/supprimer/' + ${m.id}}" 
                               class="btn btn-sm btn-light border-0" 
                               onclick="return confirm('Supprimer ce membre ?')" title="Supprimer">
                                <i class="bi bi-trash3 text-danger"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(membres)}">
                    <td colspan="5" class="text-center py-5">
                        <p class="text-muted">Aucun membre n'est actuellement inscrit.</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-5">
        <ul class="pagination justify-content-center gap-1">
            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                <a class="page-link border-0 rounded-3 shadow-sm" th:href="@{/membres(page=${currentPage - 1})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link border-0 rounded-3 shadow-sm mx-1" th:href="@{/membres(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                <a class="page-link border-0 rounded-3 shadow-sm" th:href="@{/membres(page=${currentPage + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
